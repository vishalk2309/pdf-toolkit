<svg xmlns="http://www.w3.org/2000/svg" width="940" height="560" viewBox="0 0 940 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .box { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.5; rx:10; }
      .container { fill:#eef0ff; stroke:#6366f1; stroke-width:2; }
      .accent { fill:#6366f1; }
      .sub { fill:#f7f7ff; stroke:#c7c9f5; stroke-width:1.2; }
      .ext { fill:#f3fbf8; stroke:#0d9488; stroke-width:1.5; }
      .t { font-size:13px; fill:#1e1b3a; }
      .tb { font-size:14px; font-weight:700; fill:#1e1b3a; }
      .tw { font-size:13px; font-weight:700; fill:#ffffff; }
      .lbl { font-size:11px; fill:#475569; }
      .line { stroke:#475569; stroke-width:1.6; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <text x="470" y="30" text-anchor="middle" font-size="18" font-weight="800" fill="#1e1b3a">PDFVish — Architecture</text>

  <!-- Browser -->
  <rect class="box" x="30" y="90" width="180" height="120" rx="12"/>
  <rect class="accent" x="30" y="90" width="180" height="30" rx="12"/>
  <rect class="accent" x="30" y="105" width="180" height="15"/>
  <text x="120" y="110" text-anchor="middle" class="tw">Browser / PWA</text>
  <text x="120" y="145" text-anchor="middle" class="t">React SPA (Vite)</text>
  <text x="120" y="167" text-anchor="middle" class="t">Installable app</text>
  <text x="120" y="189" text-anchor="middle" class="lbl">localStorage: JWT</text>

  <!-- Render container -->
  <rect class="container" x="300" y="70" width="360" height="330" rx="14"/>
  <text x="480" y="95" text-anchor="middle" class="tb">Render — Docker container</text>
  <text x="480" y="115" text-anchor="middle" class="lbl">Gunicorn → Flask (app.py)</text>

  <!-- API sub-box -->
  <rect class="sub" x="325" y="135" width="310" height="150" rx="10"/>
  <text x="480" y="156" text-anchor="middle" class="tb">/api  REST endpoints</text>
  <rect class="box" x="345" y="170" width="270" height="34" rx="8"/>
  <text x="480" y="192" text-anchor="middle" class="t">PDF tools — utils/*.py (merge, convert, OCR…)</text>
  <rect class="box" x="345" y="212" width="270" height="34" rx="8"/>
  <text x="480" y="234" text-anchor="middle" class="t">/api/auth/* — JWT, OTP, Google (auth.py)</text>
  <rect class="box" x="345" y="254" width="270" height="24" rx="8"/>
  <text x="480" y="271" text-anchor="middle" class="t">/api/contact</text>

  <!-- Static host sub-box -->
  <rect class="sub" x="325" y="300" width="310" height="78" rx="10"/>
  <text x="480" y="324" text-anchor="middle" class="tb">Serves built React app</text>
  <text x="480" y="346" text-anchor="middle" class="t">SPA fallback for non-API routes</text>
  <text x="480" y="366" text-anchor="middle" class="lbl">(same origin → no CORS in prod)</text>

  <!-- External services -->
  <rect class="ext" x="730" y="90" width="180" height="60" rx="10"/>
  <text x="820" y="116" text-anchor="middle" class="tb">Aiven MySQL</text>
  <text x="820" y="136" text-anchor="middle" class="lbl">users table (SSL)</text>

  <rect class="ext" x="730" y="180" width="180" height="60" rx="10"/>
  <text x="820" y="206" text-anchor="middle" class="tb">Brevo</text>
  <text x="820" y="226" text-anchor="middle" class="lbl">transactional email</text>

  <rect class="ext" x="730" y="270" width="180" height="60" rx="10"/>
  <text x="820" y="296" text-anchor="middle" class="tb">Google OAuth</text>
  <text x="820" y="316" text-anchor="middle" class="lbl">verify ID tokens</text>

  <!-- Arrows -->
  <path class="line" d="M212,150 L298,150"/>
  <text x="255" y="142" text-anchor="middle" class="lbl">HTTPS</text>

  <path class="line" d="M660,150 L728,120"/>
  <text x="700" y="128" text-anchor="middle" class="lbl">SQL</text>
  <path class="line" d="M660,210 L728,210"/>
  <text x="697" y="202" text-anchor="middle" class="lbl">API</text>
  <path class="line" d="M660,270 L728,300"/>
  <text x="700" y="298" text-anchor="middle" class="lbl">verify</text>

  <!-- Deploy note -->
  <rect class="box" x="300" y="430" width="360" height="70" rx="10"/>
  <text x="480" y="455" text-anchor="middle" class="tb">CI / Deploy</text>
  <text x="480" y="477" text-anchor="middle" class="t">git push main → Render auto-builds Docker image</text>
  <text x="480" y="494" text-anchor="middle" class="lbl">multi-stage: Node build → Python + LibreOffice/Tesseract</text>

  <path class="line" d="M120,210 L120,465 L298,465"/>
  <text x="150" y="430" text-anchor="middle" class="lbl">GitHub</text>
</svg>
